name: Update GPU List

on:
  schedule:
    - cron: "0 18 * * *"   # 毎日 JST 03:00
  workflow_dispatch:

jobs:
  update-gpu-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run GPU list generator
        run: |
          chmod +x scripts/generate_gpu_env.sh
          scripts/generate_gpu_env.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/GPU || true
          git commit -m "Auto-update GPU list" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
